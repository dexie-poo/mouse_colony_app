<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mouse Colony Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Mouse Colony Manager</h1>
        <p>V1 colony records, cages, and assignments</p>
      </div>
      <button id="refreshButton" type="button">Refresh</button>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>Add Mouse</h2>
        <form id="mouseForm" class="form-grid">
          <label>
            Genotype
            <input name="genotype" required />
          </label>
          <label>
            Gender
            <select name="gender" required>
              <option value="">Select</option>
              <option value="Female">Female</option>
              <option value="Male">Male</option>
              <option value="Unknown">Unknown</option>
            </select>
          </label>
          <label>
            Project
            <input name="project" />
          </label>
          <label>
            DOB
            <input name="dob" type="date" />
          </label>
          <label>
            Age
            <input name="age" placeholder="e.g. 8 weeks" />
          </label>
          <label>
            Age Analysed
            <input name="age_analysed" placeholder="e.g. 12 weeks" />
          </label>
          <label class="wide">
            Notes
            <textarea name="notes" rows="3"></textarea>
          </label>
          <label>
            Cage
            <select name="cage_id" id="mouseCageSelect">
              <option value="">Unassigned</option>
            </select>
          </label>
          <button type="submit">Add Mouse</button>
        </form>
      </section>

      <section class="panel">
        <h2>Add Cage</h2>
        <form id="cageForm" class="form-grid">
          <label>
            Cage Name
            <input name="name" required />
          </label>
          <label>
            Location
            <input name="location" />
          </label>
          <label class="wide">
            Notes
            <textarea name="notes" rows="3"></textarea>
          </label>
          <button type="submit">Add Cage</button>
        </form>
      </section>

      <section class="panel">
        <h2>Assign Mouse to Cage</h2>
        <form id="assignForm" class="form-grid">
          <label>
            Mouse
            <select name="mouse_id" id="assignMouseSelect" required></select>
          </label>
          <label>
            Cage
            <select name="cage_id" id="assignCageSelect" required></select>
          </label>
          <button type="submit">Assign</button>
        </form>
      </section>

      <section class="panel table-panel">
        <h2>Mouse Table</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Genotype</th>
                <th>Gender</th>
                <th>Project</th>
                <th>DOB</th>
                <th>Age</th>
                <th>Age Analysed</th>
                <th>Cage</th>
                <th>Notes</th>
              </tr>
            </thead>
            <tbody id="mouseTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="status" class="status" role="status"></div>
    <script src="script.js"></script>
  </body>
</html>
