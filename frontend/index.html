<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mouse Colony Manager</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Mouse Colony Manager</h1>
        <p>V2 colony records, cage numbers, and mating history</p>
      </div>
      <div class="header-actions">
        <button id="exportButton" type="button">Export Excel</button>
        <button id="refreshButton" type="button">Refresh</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>Add Mouse</h2>
        <form id="mouseForm" class="form-grid">
          <label>
            Genotype
            <input name="genotype" required />
          </label>
          <label>
            Gender
            <select name="gender" required>
              <option value="">Select</option>
              <option value="Female">Female</option>
              <option value="Male">Male</option>
              <option value="Unknown">Unknown</option>
            </select>
          </label>
          <label>
            DOB
            <input name="dob" type="date" />
          </label>
          <label>
            Owner
            <input name="owner" />
          </label>
          <label>
            Cage Number
            <input name="cage_number" placeholder="e.g. C12" />
          </label>
          <label class="wide">
            Remark
            <textarea name="remark" rows="3"></textarea>
          </label>
          <button type="submit">Add Mouse</button>
        </form>
      </section>

      <section class="panel">
        <h2>Assign Cage Number</h2>
        <form id="assignForm" class="form-grid">
          <label>
            Mouse
            <select name="mouse_id" id="assignMouseSelect" required></select>
          </label>
          <label>
            Cage Number
            <input name="cage_number" list="cageNumbers" required />
            <datalist id="cageNumbers"></datalist>
          </label>
          <button type="submit">Transfer</button>
        </form>
      </section>

      <section class="panel">
        <h2>Mating</h2>
        <form id="matingForm" class="form-grid">
          <label>
            Sire
            <select name="sire_id" id="sireSelect" required></select>
          </label>
          <label>
            Dam
            <select name="dam_id" id="damSelect" required></select>
          </label>
          <label>
            Mating Date
            <input name="mating_date" type="date" />
          </label>
          <label>
            Pup DOB
            <input name="litter_dob" type="date" />
          </label>
          <label>
            Litter Size
            <input name="litter_size" inputmode="numeric" />
          </label>
          <label>
            Male Pups
            <input name="male_pups" inputmode="numeric" />
          </label>
          <label>
            Female Pups
            <input name="female_pups" inputmode="numeric" />
          </label>
          <label class="wide">
            Pup Genotypes
            <textarea name="pup_genotypes" rows="3" placeholder="e.g. WT: 3M/2F; Het: 1M/2F"></textarea>
          </label>
          <label class="wide">
            Notes
            <textarea name="notes" rows="3"></textarea>
          </label>
          <button type="submit">Record Mating</button>
        </form>
      </section>

      <section class="panel">
        <h2>Mating History</h2>
        <label>
          Mouse
          <select id="historyMouseSelect"></select>
        </label>
        <div id="matingHistory" class="history-list"></div>
      </section>

      <section class="panel table-panel">
        <h2>Mouse Table</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>MiceID</th>
                <th>Gender</th>
                <th>DOB</th>
                <th>Age (Months)</th>
                <th>Genotype</th>
                <th>Owner</th>
                <th>Remark</th>
                <th>Cage Number</th>
                <th>Mating</th>
              </tr>
            </thead>
            <tbody id="mouseTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="status" class="status" role="status"></div>
    <script src="/static/script.js"></script>
  </body>
</html>
